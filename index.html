<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meantz 놀이터</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --sidebar-width: 240px;
            --dark-bg: #1a1a1a;
            --accent-color: #eb4d4b;
            --bg-color: #f4f7f6;
            --white: #ffffff;
            --border: #e0e0e0;
        }

        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg-color); color: #333; }
        .hidden { display: none !important; }
        button, .pointer, nav ul li, table tbody tr { cursor: pointer; }

        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: none; justify-content: center; align-items: center; z-index: 2000; }
        #mainApp { display: none; min-height: 100vh; }

        #loadingLayer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--dark-bg); display: flex; justify-content: center; 
            align-items: center; color: white; z-index: 9999; font-size: 1.2rem;
        }

        .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: var(--dark-bg); color: white; border: none; border-radius: 6px; font-weight: bold; }

        nav { 
            width: var(--sidebar-width); background: var(--dark-bg); color: #ccc; 
            position: fixed; height: 100%; display: flex; flex-direction: column; z-index: 1001;
            transition: transform 0.3s ease;
        }
        
        nav h3 { padding: 25px 20px; color: white; border-bottom: 1px solid #333; margin: 0; }
        nav ul { list-style: none; padding: 0; flex-grow: 1; margin: 0; overflow-y: auto; }
        nav ul li { padding: 15px 25px; transition: 0.2s; font-size: 14px; }
        nav ul li.active { background: #333; color: white; border-right: 4px solid var(--accent-color); }
        
        .nav-footer { padding: 15px; border-top: 1px solid #333; background: #222; }
        .user-info-box { font-size: 12px; color: #aaa; margin-bottom: 10px; padding: 10px; background: #2a2a2a; border-radius: 4px; }
        .user-info-box b { color: var(--accent-color); }
        
        .btn-chat { width: 100%; padding: 10px; background: #ffffff; color: #1a1a1a; border: 1px solid #1a1a1a; border-radius: 4px; font-weight: bold; margin-bottom: 5px; }
        .logout-btn { width: 100%; padding: 8px; background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; border-radius: 4px; margin-top: 10px; }

        main { flex: 1; margin-left: var(--sidebar-width); padding: 40px 20px; display: flex; justify-content: center; }
        .content-wrapper { width: 100%; max-width: 900px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }

        .mobile-header { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: var(--dark-bg); color: white; align-items: center; padding: 0 15px; box-sizing: border-box; z-index: 1000; }
        .menu-toggle-btn { background: none; border: none; color: white; font-size: 24px; }

        #mobileOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #f9f9f9; font-size: 0.85rem; color: #777; }
        .col-num { width: 50px; text-align: center; }
        .col-author { width: 120px; }
        .col-date { width: 100px; text-align: center; }
        .btn-main { background: var(--dark-bg); color: white; padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; }
        .btn-sub { background: #eee; color: #333; padding: 10px 20px; border: none; border-radius: 4px; }
        .search-bar { display: flex; gap: 5px; margin-top: 20px; }
        .search-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }

        .notice-row { background-color: #fff9f9 !important; font-weight: bold; }
        .notice-badge { background: var(--accent-color); color: white; padding: 2px 6px; border-radius: 3px; font-size: 11px; margin-right: 5px; }
        
        /* New 뱃지 스타일 추가 */
        .new-badge { background: #ff9800; color: white; padding: 2px 6px; border-radius: 3px; font-size: 11px; margin-right: 5px; font-weight: bold; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 400px; max-height: 85vh; overflow-y: auto; }
        .item-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .tab-btn { padding: 5px 10px; border: 1px solid #ddd; background: #fff; }
        .tab-btn.active { background: var(--dark-bg); color: white; }

        @media screen and (max-width: 768px) {
            nav { transform: translateX(-100%); }
            nav.open { transform: translateX(0); }
            main { margin-left: 0; padding-top: 70px; }
            .mobile-header { display: flex; }
            .col-author, .col-date { display: none; }
            .card { padding: 15px; }
        }

        /* 게시글 미리보기 스타일 추가 */
        .post-preview { display: block; font-size: 12px; color: #888; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    
        /* 제목 열의 높이를 조금 더 확보 */
        .col-title { padding: 10px 12px !important; vertical-align: middle; }

        .board-tag { font-size: 10px; padding: 2px 5px; background: #eee; border-radius: 3px; margin-right: 5px; color: #666; }
    </style>
</head>
<body>

    <div id="loadingLayer">잠시만 기다려 주세요...</div>

    <div id="loginOverlay">
        <div class="login-card">
            <h2>Meantz 놀이터</h2>
            <input type="email" id="loginEmail" placeholder="아이디(이메일)">
            <input type="password" id="loginPw" placeholder="비밀번호">        
            <button onclick="handleLogin()" style="margin-bottom: 8px;">로그인</button>
            <button onclick="handleSignup()" class="btn-sub" style="width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; box-sizing: border-box;">회원가입</button>
            <p id="loginError" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div class="mobile-header" id="mobileHeader">
        <button class="menu-toggle-btn" onclick="toggleMobileMenu()">☰</button>
        <span style="font-weight: bold; margin-left: 10px;">Meantz 놀이터</span>
    </div>

    <div id="mobileOverlay" onclick="toggleMobileMenu()"></div>

    <div id="mainApp">
        <nav id="sidebar">
            <h3 onclick="toggleMobileMenu()" class="pointer">MY BOARD</h3>

            <div style="padding: 15px 20px; border-bottom: 1px solid #333; background: #222;">
                <div style="font-size: 13px; color: #fff; margin-bottom: 5px;"><b id="sideUserName" style="color: var(--accent-color);"></b>님, 환영합니다!</div>
                <div style="font-size: 12px; color: #aaa; margin-bottom: 10px;">등급: <b>Lv.<span id="sideUserLevel">0</span></b></div>
                <button class="btn-sub" style="width: 100%; padding: 6px; font-size: 12px; background: #333; color: white; border: 1px solid #555;" onclick="openProfileModal()">내 정보 수정</button>
            </div>
        
            <ul id="menuList"></ul>
            <div class="nav-footer">
                <!-- (기존 user-info-box 삭제됨) -->
                <button class="btn-chat" onclick="openChatPopup()">💬 실시간 채팅</button>
                <button id="adminMenuBtn" class="btn-sub hidden" style="width:100%; font-size: 12px; margin-bottom:5px;" onclick="showAdminView()">⚙️ 사이트 관리</button>
                <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
            </div>
        </nav>

        <main>
            <div class="content-wrapper">
                <div id="homeView" class="hidden">
                    <div class="board-header"><h2>🏠 메인 화면</h2></div>
                    <div class="card" style="padding:0; margin-bottom: 20px;">
                        <table id="homePostTable">
                            <thead>
                                <tr>
                                    <th class="col-num">출처</th>
                                    <th class="col-title">최신 게시글</th>
                                    <th class="col-date">날짜</th>
                                </tr>
                            </thead>
                            <tbody id="homeTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            
                <div id="listView">
                    <div class="board-header"><h2 id="boardTitle">게시판</h2></div>
                    <div class="card" style="padding:0">
                        <table>
                            <thead>
                                <tr>
                                    <th class="col-num">번호</th>
                                    <th class="col-title">제목</th>
                                    <th class="col-author">작성자</th>
                                    <th class="col-date">날짜</th>
                                </tr>
                            </thead>
                            <tbody id="postTableBody"></tbody>
                        </table>
                    </div>
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="제목 또는 내용 검색...">
                        <button class="btn-sub" onclick="searchPosts()">검색</button>
                        <button id="writeBtn" class="btn-main" onclick="showEditor()" style="margin-left:auto;">글쓰기</button>
                    </div>
                </div>

                <div id="editorView" class="hidden">
                    <div class="board-header"><h2>작성</h2></div>
                    <div class="card">
                        <input type="hidden" id="editId">
                        <p style="margin: 0 0 10px 0; font-size: 13px; color: #666;">작성자: <b id="displayAuthor"></b></p>
                        <div style="display:flex; gap:20px; margin-bottom: 10px; font-size: 14px;">
                            <label><input type="checkbox" id="htmlCheck"> HTML 사용</label>
                            <label><input type="checkbox" id="secretCheck"> 🔒 비밀글</label>
                            <label id="noticeArea" class="hidden" style="color: var(--accent-color); font-weight: bold; cursor: pointer;">
                                <input type="checkbox" id="noticeCheck"> 📌 공지사항 고정
                            </label>
                        </div>
                        <input type="text" id="postTitleInput" placeholder="제목을 입력하세요" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; box-sizing: border-box;">
                        <textarea id="postContentInput" style="width:100%; height:350px; padding:10px; border:1px solid #ddd; box-sizing: border-box;"></textarea>
                        <div style="text-align: right; margin-top:15px;">
                            <button class="btn-sub" onclick="showList()">취소</button>
                            <button class="btn-main" onclick="savePost()">저장하기</button>
                        </div>
                    </div>
                </div>

                <div id="detailView" class="hidden">
                    <div class="board-header"><h2 id="viewTitle">내용 보기</h2></div>
                    <div class="card">
                        <p id="viewMeta" style="color:#888; font-size:13px;"></p>
                        <div id="viewContent" style="white-space: pre-wrap; line-height:1.6; min-height:150px;"></div>
                        <div style="margin-top:40px; display:flex; justify-content:space-between; border-top: 1px solid #eee; padding-top: 20px;">
                            <button class="btn-sub" onclick="showList()">목록으로</button>
                            <div>
                                <button id="editBtn" class="btn-sub">수정</button>
                                <button id="deleteBtn" class="btn-sub" style="color:red;">삭제</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ========================================== -->
                <!-- [추가된 부분] 메인 화면용 사이트 관리 뷰 -->
                <!-- ========================================== -->
                <div id="adminView" class="hidden">
                    <div class="board-header"><h2>⚙️ 사이트 관리</h2></div>
                    <div class="card" style="padding: 20px;">
                        <div style="margin-bottom:15px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
                            <button class="tab-btn active" id="adminTab1" onclick="switchAdminTab(1)">메뉴/등급 설정</button>
                            <button class="tab-btn" id="adminTab2" onclick="switchAdminTab(2)">사용자 관리 및 정보조회</button>
                        </div>
                    
                        <!-- 탭 1: 메뉴/등급 설정 -->
                        <div id="adminTabContent1">
                            <div id="menuEditArea" style="margin-bottom: 15px;"></div>
                            <div style="display:flex; gap:5px; margin-bottom: 20px;">
                                <input type="text" id="newMenuInput" placeholder="새 게시판 이름" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:4px;">
                                <button class="btn-sub" onclick="addMenu()">추가</button>
                            </div>
                            <button class="btn-main" style="width:100%;" onclick="saveAllSettings()">설정 최종 저장</button>
                        </div>

                        <!-- 탭 2: 사용자 관리 및 정보조회 -->
                        <div id="adminTabContent2" class="hidden">
                            <div style="overflow-x: auto;">
                                <table style="min-width: 700px; font-size: 13px;">
                                    <thead>
                                        <tr>
                                            <th>이메일(ID)</th>
                                            <th>닉네임</th>
                                            <th>연락처</th>
                                            <th>생년월일</th>
                                            <th>주소</th>
                                            <th style="width: 70px;">등급</th>
                                            <th style="width: 60px;">관리</th>
                                        </tr>
                                    </thead>
                                    <tbody id="adminUserTableBody">
                                        <!-- 유저 목록이 여기에 렌더링됩니다 -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>                
            </div>
        </main>
    </div>

    <!-- [추가된 내 정보 수정 모달] -->
    <div id="profileModal" class="modal hidden">
        <div class="modal-content" style="width: 350px;">
            <h3 style="margin-top: 0;">내 정보 수정</h3>
            <p style="font-size: 12px; color: #888; margin-bottom: 15px;">아래 정보는 선택 사항입니다.</p>

            <input type="text" id="profNickname" placeholder="닉네임 (기본값: 이메일 앞자리)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; box-sizing:border-box; border-radius:4px; font-weight:bold;">
            <input type="text" id="profPhone" placeholder="핸드폰 번호 (예: 010-1234-5678)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; box-sizing:border-box; border-radius:4px;">
            <input type="date" id="profBirth" placeholder="생년월일" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; box-sizing:border-box; border-radius:4px;">
            <input type="text" id="profAddress" placeholder="집 주소" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ddd; box-sizing:border-box; border-radius:4px;">
        
            <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 15px;">
        
            <p style="font-size: 12px; color: #eb4d4b; font-weight: bold; margin-bottom: 8px;">* 정보 저장 및 탈퇴 시 비밀번호 확인 필수</p>
            <input type="password" id="profPassword" placeholder="현재 비밀번호 입력" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #eb4d4b; box-sizing:border-box; border-radius:4px;">
        
            <div style="display:flex; gap:10px; margin-bottom: 15px;">
                <button class="btn-sub" style="flex:1;" onclick="closeProfileModal()">취소</button>
                <button class="btn-main" style="flex:1;" onclick="saveProfile()">저장하기</button>
            </div>
        
            <div style="text-align: right;">
                <button onclick="deleteUserAccount()" style="background:none; border:none; color:#aaa; text-decoration:underline; font-size:12px; cursor:pointer;">회원 탈퇴하기</button>
            </div>
        </div>
    </div>  

<script>
    const ADMIN_EMAILS = ["오민택@aa.bb"]; 

    const firebaseConfig = {
        apiKey: "AIzaSyB8uG7VjV3cB12gaynB6AmTyjHcw0K9M-U",
        authDomain: "meantzboard.firebaseapp.com",
        projectId: "meantzboard",
        storageBucket: "meantzboard.firebasestorage.app",
        messagingSenderId: "807743275828",
        appId: "1:807743275828:web:2effa72896931a2df15b61"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentBoard = "";
    let boards = []; 
    let currentUserEmail = "";
    let currentUserLevel = 0;
    let currentUserNickname = ""; // [추가] 현재 접속자의 닉네임을 담을 변수

    auth.onAuthStateChanged(async (user) => {
        const loginOverlay = document.getElementById('loginOverlay');
        const mainApp = document.getElementById('mainApp');
        const loadingLayer = document.getElementById('loadingLayer');
        const mobileHeader = document.getElementById('mobileHeader');

        if (user) {
            currentUserEmail = user.email;
            
            const userDoc = await db.collection("users").doc(user.email).get();
            const userData = userDoc.exists ? userDoc.data() : {};
            
            currentUserLevel = userData.level || 0;
            // [추가/수정] DB에 닉네임이 있으면 쓰고, 없으면 이메일 앞자리를 씁니다.
            currentUserNickname = userData.nickname || user.email.split('@')[0]; 

            document.getElementById('sideUserName').innerText = currentUserNickname;
            document.getElementById('sideUserLevel').innerText = currentUserLevel;

            loginOverlay.style.display = 'none';
            mainApp.style.display = 'flex'; 
            if(window.innerWidth <= 768) mobileHeader.style.display = 'flex';
            if (ADMIN_EMAILS.includes(user.email)) document.getElementById('adminMenuBtn').classList.remove('hidden');
            await loadMenu();
            showHome(); // 로그인 성공 시 첫 화면을 홈으로!
        } else {
            loginOverlay.style.display = 'flex';
            mainApp.style.display = 'none';
            mobileHeader.style.display = 'none';
        }
        if (loadingLayer) loadingLayer.style.display = 'none';
    });

    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const pw = document.getElementById('loginPw').value;
        auth.signInWithEmailAndPassword(email, pw).catch(e => {
            document.getElementById('loginError').innerText = "아이디/비밀번호 오류입니다.";
        });
    }

    function handleSignup() {
        const email = document.getElementById('loginEmail').value.trim();
        const pw = document.getElementById('loginPw').value.trim();
        const errorMsg = document.getElementById('loginError');
        
        if(!email || !pw) return errorMsg.innerText = "이메일과 비밀번호를 모두 입력해주세요.";
        if(pw.length < 6) return errorMsg.innerText = "비밀번호는 6자리 이상이어야 합니다.";

        errorMsg.style.color = "blue";
        errorMsg.innerText = "가입 처리 중...";

        auth.createUserWithEmailAndPassword(email, pw)
            .then(async (userCredential) => {
                // 가입 성공 시 Firestore users 컬렉션에 기본 등급(Lv.0)으로 데이터 생성
                await db.collection("users").doc(email).set({ level: 0 });
                errorMsg.innerText = "가입 성공! 자동으로 로그인됩니다.";
                // 성공하면 onAuthStateChanged가 반응하여 자동으로 로그인 처리 및 메인화면으로 넘어갑니다.
            })
            .catch(e => {
                errorMsg.style.color = "red";
                if(e.code === 'auth/email-already-in-use') {
                    errorMsg.innerText = "이미 가입된 이메일입니다.";
                } else if(e.code === 'auth/invalid-email') {
                    errorMsg.innerText = "올바른 이메일 형식이 아닙니다.";
                } else {
                    errorMsg.innerText = "회원가입 오류가 발생했습니다.";
                }
            });
    }

    function handleLogout() { auth.signOut().then(() => location.reload()); }

    async function loadMenu() {
        const doc = await db.collection("settings").doc("menu").get();
        if (doc.exists) {
            // 기존 단일 level 값을 readLevel과 writeLevel로 마이그레이션(변환) 처리
            boards = doc.data().list.map(b => ({
                name: b.name,
                readLevel: b.readLevel !== undefined ? b.readLevel : (b.level || 0),
                writeLevel: b.writeLevel !== undefined ? b.writeLevel : (b.level || 0)
            }));
        } else {
            boards = [{name: "자유게시판", readLevel: 0, writeLevel: 0}];
        }
        renderMenu();
        // 읽기 권한이 있는 첫 번째 게시판을 찾아 띄워줍니다.
        const firstReadableBoard = boards.find(b => currentUserLevel >= b.readLevel);
        if(!currentBoard && firstReadableBoard) switchBoard(firstReadableBoard.name);
    }

    function renderMenu() {
        const list = document.getElementById('menuList');
        list.innerHTML = "";
        boards.forEach(b => {
            const li = document.createElement('li');
            // [수정] 메뉴에 읽기(R), 쓰기(W) 등급을 분리해서 표시합니다.
            li.innerHTML = `${b.name} <span style="font-size:10px; opacity:0.5;">[읽기 Lv.${b.readLevel} / 쓰기 Lv.${b.writeLevel}]</span>`;
            if(b.name === currentBoard) li.className = "active";
            li.onclick = () => {
                switchBoard(b.name);
                if(window.innerWidth <= 768) toggleMobileMenu();
            };
            list.appendChild(li);
        });
    }

    function switchBoard(name) {
        currentBoard = name;
        document.getElementById('boardTitle').innerText = name;
        renderMenu();
        showList();
    }

    async function showList(search = "") {        
        const boardCfg = boards.find(b => b.name === currentBoard);

        if(boardCfg && currentUserLevel < boardCfg.readLevel) {
            alert(`[${currentBoard}] 읽기 권한이 없습니다. (필요 등급: Lv.${boardCfg.readLevel})`);
            return showHome(); // 권한이 없으면 홈 화면으로 돌려보냅니다.
        }

        hideAll();
        document.getElementById('listView').classList.remove('hidden');      
        const writeBtn = document.getElementById('writeBtn');
        
        if(boardCfg && currentUserLevel < boardCfg.writeLevel) writeBtn.classList.add('hidden');
        else writeBtn.classList.remove('hidden');

        const tbody = document.getElementById('postTableBody');
        tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>로딩 중...</td></tr>";
        let snapshot = await db.collection("boards").doc(currentBoard).collection("posts").orderBy("timestamp", "desc").get();
        tbody.innerHTML = "";
        let allPosts = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            // 검색 필터링
            if(!search || data.title.includes(search) || data.content.includes(search)) {
                allPosts.push({id: doc.id, ...data});
            }
        });

        // 공지사항 우선 정렬
        allPosts.sort((a,b) => (a.isNotice === b.isNotice) ? 0 : a.isNotice ? -1 : 1);

        // 상위 6~10개 정도만 노출하거나 전체 노출 (요청하신 6줄 기준은 정렬 순서로 처리)
        allPosts.forEach((data, i) => {
            const tr = document.createElement('tr');
            tr.onclick = () => showDetail(data.id, data);
            if(data.isNotice) tr.className = "notice-row";

            // 목록에서 제목을 표시할 때 이 로직을 적용하세요.
            const isOwner = data.author === currentUserEmail;
            const isAdmin = ADMIN_EMAILS.includes(currentUserEmail);

            const now = Date.now();
            const postTime = data.timestamp ? data.timestamp.toMillis() : now; // 생성 직후 pending 상태 에러 방지
            const isNew = (now - postTime) < (24 * 60 * 60 * 1000); // 24시간(ms) 이내인지 확인
            const newBadgeHtml = isNew ? '<span class="new-badge">N</span>' : '';

            let displayTitle = data.title;
            if (data.isSecret) {
                // 비밀글일 경우
                if (isOwner || isAdmin) {
                    // 작성자나 관리자에게는 실제 제목과 함께 상태 표시
                    displayTitle = `🔒 ${data.title} <span style="color:#eb4d4b; font-size:12px; font-weight:normal;">(비밀글)</span>`;
                } else {
                    // 일반 유저에게는 내용을 숨김
                    displayTitle = `<span style="color:#999;">🔒 비밀글입니다.</span>`;
                }
            }

            // 본문 미리보기 텍스트 생성 (HTML 태그 제거 및 길이 제한)
            let pureText = data.content.replace(/<[^>]*>?/gm, ''); // HTML 태그 제거
            let previewText = pureText.substring(0, 60) + (pureText.length > 60 ? "..." : "");

            // 작성자 닉네임 (과거 글에 닉네임이 없으면 이메일 앞자리 사용)
            const displayAuthor = data.authorNickname || data.author.split('@')[0];
            document.getElementById('viewMeta').innerText = `작성자: ${displayAuthor} | 날짜: ${data.dateShort}`;
        
            // newBadgeHtml 변수를 제목 앞에 추가
            tr.innerHTML = `
                <td class="col-num">${data.isNotice ? '📌' : allPosts.length - i}</td>
                <td class="col-title">
                    <div>
                        ${data.isNotice ? '<span class="notice-badge">공지</span>' : ''}
                        ${newBadgeHtml}
                        <span style="font-weight:600;">${displayTitle}</span>
                    </div>
                    <div class="post-preview">${previewText}</div>
                </td>
                <td class="col-author">${displayAuthor}</td>
                <td class="col-date">${data.dateShort}</td>
            `;
            tbody.appendChild(tr);
        });

        if(allPosts.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:20px;'>게시글이 없습니다.</td></tr>"; }
    }

    async function savePost() {
        const boardCfg = boards.find(b => b.name === currentBoard);
        if(boardCfg && currentUserLevel < boardCfg.writeLevel) return alert("쓰기 권한이 없습니다.");

        const title = document.getElementById('postTitleInput').value.trim();
        const content = document.getElementById('postContentInput').value.trim();
        const isHTML = document.getElementById('htmlCheck').checked;
        const isNotice = document.getElementById('noticeCheck').checked;
        const editId = document.getElementById('editId').value;

        if(!title || !content) return alert("내용을 입력하세요.");
        const now = new Date();
        const isSecret = document.getElementById('secretCheck').checked; // 추가
        const postData = { 
            title, author: currentUserEmail, 
            authorNickname: currentUserNickname, // [추가] 글을 쓸 때 현재 닉네임도 같이 저장
            content, isHTML, isNotice, isSecret, // isSecret 추가
            dateShort: `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()}`,  
            timestamp: firebase.firestore.FieldValue.serverTimestamp()  
        };

        if(editId) await db.collection("boards").doc(currentBoard).collection("posts").doc(editId).update(postData);
        else await db.collection("boards").doc(currentBoard).collection("posts").add(postData);
        showList();
    }

    function showEditor(id = null, data = null) {
        hideAll();
        document.getElementById('editorView').classList.remove('hidden');
        document.getElementById('displayAuthor').innerText = currentUserEmail;

        // [복구] 관리자일 때만 공지 체크박스 노출
        const noticeArea = document.getElementById('noticeArea');
        if (ADMIN_EMAILS.includes(currentUserEmail)) noticeArea.classList.remove('hidden');
        else noticeArea.classList.add('hidden');

        if(id) {
            document.getElementById('editId').value = id;
            document.getElementById('postTitleInput').value = data.title;
            document.getElementById('postContentInput').value = data.content;
            document.getElementById('htmlCheck').checked = data.isHTML || false;
            document.getElementById('noticeCheck').checked = data.isNotice || false;
            document.getElementById('secretCheck').checked = data.isSecret || false;
        } else {
            document.getElementById('editId').value = "";
            document.getElementById('postTitleInput').value = "";
            document.getElementById('postContentInput').value = "";
            document.getElementById('htmlCheck').checked = false;
            document.getElementById('noticeCheck').checked = false;
            document.getElementById('secretCheck').checked = false;
        }

    async function showDetail(id, data) {
        // 1. 권한 확인 (작성자 또는 관리자 여부)
        const isOwner = data.author === currentUserEmail;
        const isAdmin = ADMIN_EMAILS.includes(currentUserEmail);

        // 2. 비밀글 권한 체크 (★이게 맨 위로 와야 합니다★)
        if (data.isSecret && !isOwner && !isAdmin) {
            alert("비밀글은 작성자와 관리자만 볼 수 있습니다. 🔒");
            // 메인 화면이나 목록으로 돌아가도록 처리 (옵션)
            if(currentBoard) showList(); else showHome();
            return; 
        }

        // 3. 화면 전환 및 초기화
        hideAll();
        document.getElementById('detailView').classList.remove('hidden');

        // 4. 제목 및 메타정보 표시
        // 운영자나 작성자가 비밀글을 볼 때 제목에 표시를 해줍니다.
        let displayTitle = data.title;
        if (data.isSecret) {
            displayTitle = `🔒 ${data.title} <span style="color:#eb4d4b; font-size:14px; font-weight:normal;">(비밀글)</span>`;
        }
    
        document.getElementById('viewTitle').innerHTML = displayTitle;
        document.getElementById('viewMeta').innerText = `작성자: ${data.author} | 날짜: ${data.dateShort}`;

        // 5. 본문 표시
        const viewContent = document.getElementById('viewContent');
        if (data.isHTML) {
            viewContent.innerHTML = data.content;
        } else {
            viewContent.innerText = data.content;
        }

        // 6. 수정/삭제 버튼 권한 제어
        // 작성자이거나 관리자일 때만 버튼을 보여줍니다.
        const canEdit = isOwner || isAdmin; 
        document.getElementById('editBtn').classList.toggle('hidden', !canEdit);
        document.getElementById('deleteBtn').classList.toggle('hidden', !canEdit);

        // 7. 버튼 클릭 이벤트 연결
        document.getElementById('editBtn').onclick = () => showEditor(id, data);
        document.getElementById('deleteBtn').onclick = async () => {
            if (confirm("정말 삭제할까요?")) {
                await db.collection("boards").doc(currentBoard).collection("posts").doc(id).delete();
                alert("삭제되었습니다.");
                showList();
            }
        };
    }

    // [관리자 전용] 모든 사용자 정보 불러오기
    async function loadAllUsers() {
        const tbody = document.getElementById('adminUserTableBody');
        tbody.innerHTML = "<tr><td colspan='7' style='text-align:center; padding: 20px;'>사용자 정보를 불러오는 중...</td></tr>";
        
        try {
            // Firestore 'users' 컬렉션의 모든 문서를 가져옵니다.
            const snapshot = await db.collection("users").get();
            tbody.innerHTML = "";
            
            snapshot.forEach(doc => {
                const email = doc.id;
                const data = doc.data();
                const tr = document.createElement('tr');
                
                // HTML id 속성에 @나 .이 들어가면 오류가 나므로 변환 처리
                const safeId = email.replace(/[@.]/g, ''); 
                
                tr.innerHTML = `
                    <td style="color:#eb4d4b; font-weight:bold;">${email}</td>
                    <td>${data.nickname || '-'}</td>
                    <td>${data.phone || '-'}</td>
                    <td>${data.birth || '-'}</td>
                    <td>${data.address || '-'}</td>

                        <input type="number" id="levelInput_${safeId}" value="${data.level || 0}" style="width: 50px; padding: 5px; border:1px solid #ddd; text-align:center; border-radius:3px;">
                    </td>
                    <td>
                        <button class="btn-sub" style="padding: 5px 10px; font-size: 12px; background:#333; color:white;" onclick="updateSpecificUserLevel('${email}', '${safeId}')">적용</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            tbody.innerHTML = "<tr><td colspan='7' style='text-align:center; color:red;'>정보를 불러오지 못했습니다.</td></tr>";
            console.error(error);
        }
    }

    // [관리자 전용] 특정 유저 등급 즉시 수정
    async function updateSpecificUserLevel(email, safeId) {
        if (!confirm(`[${email}] 사용자의 등급을 변경하시겠습니까?`)) return;
        
        const levelInput = document.getElementById(`levelInput_${safeId}`).value;
        const newLevel = parseInt(levelInput);
        
        if (isNaN(newLevel)) return alert("올바른 등급(숫자)을 입력하세요.");
        
        try {
            await db.collection("users").doc(email).set({ level: newLevel }, { merge: true });
            alert(`${email} 님의 등급이 Lv.${newLevel} (으)로 수정되었습니다.`);
        } catch (error) {
            alert("등급 수정 중 오류가 발생했습니다.");
            console.error(error);
        }
    }

        boards[index].level = parseInt(newLevel) || 0;

    // 3. 새 게시판 추가 기능
    function addMenu() {
        const name = document.getElementById('newMenuInput').value.trim();
        if(!name) return alert("추가할 게시판 이름을 입력하세요.");
        if(boards.some(b => b.name === name)) return alert("이미 존재하는 게시판 이름입니다.");
        
        // [수정] 생성 시 읽기와 쓰기 등급을 각각 0으로 분리 세팅
        boards.push({ name, readLevel: 0, writeLevel: 0 }); 
        document.getElementById('newMenuInput').value = ""; 
        renderMenuEditArea(); 
    }

    // 4. 게시판 순서 위/아래 이동 기능
    function moveMenu(i, d) {
        if(i+d < 0 || i+d >= boards.length) return;
        const temp = boards[i];
        boards[i] = boards[i+d];
        boards[i+d] = temp;
        renderMenuEditArea();
    }

    // 5. 게시판 삭제 기능
    function deleteMenu(i) { 
        if(confirm(`'${boards[i].name}' 게시판을 목록에서 삭제하시겠습니까?\n(주의: 메뉴에서만 사라지며, 기존에 작성된 글 데이터는 DB에 남아있습니다.)`)) { 
            boards.splice(i, 1); 
            renderMenuEditArea(); 
        } 
    }

    // 2. 홈 화면 로직 (모든 게시판의 글을 통합)
    async function showHome() {
        hideAll();
        currentBoard = ""; // 특정 게시판 선택 해제
        renderMenu(); 
        document.getElementById('homeView').classList.remove('hidden');
        const tbody = document.getElementById('homeTableBody');

        const readableBoards = boards.filter(b => currentUserLevel >= b.readLevel);

        // 모든 게시판(boards)에서 글을 가져옵니다.
        for (const b of readableBoards) {
            const snap = await db.collection("boards").doc(b.name).collection("posts")
                          .orderBy("timestamp", "desc").limit(10).get();
            snap.forEach(doc => {
              allIntegratedPosts.push({ id: doc.id, boardName: b.name, ...doc.data() });
            });
        }

        // 정렬 규칙: 1. 공지사항 우선, 2. 최신 날짜순
        allIntegratedPosts.sort((a, b) => {
            if (a.isNotice !== b.isNotice) return a.isNotice ? -1 : 1;
            return b.timestamp - a.timestamp;
        });

        // 상위 6개만 표기
        const displayPosts = allIntegratedPosts.slice(0, 6);

        tbody.innerHTML = "";
        displayPosts.forEach(data => {
            const tr = document.createElement('tr');
            tr.onclick = () => {
                currentBoard = data.boardName; // 해당 게시판으로 컨텍스트 변경
                showDetail(data.id, data);
            };
        
            if(data.isNotice) tr.className = "notice-row";

            const isOwner = data.author === currentUserEmail;
            const isAdmin = ADMIN_EMAILS.includes(currentUserEmail);

            const now = Date.now();
            const postTime = data.timestamp ? data.timestamp.toMillis() : now;
            const isNew = (now - postTime) < (24 * 60 * 60 * 1000);
            const newBadgeHtml = isNew ? '<span class="new-badge">N</span>' : '';

            let displayTitle = data.title;
            if (data.isSecret) {
                // 비밀글일 경우
                if (isOwner || isAdmin) {
                    // 작성자나 관리자에게는 실제 제목과 함께 상태 표시
                    displayTitle = `🔒 ${data.title} <span style="color:#eb4d4b; font-size:0.8em; font-weight:normal;">(비밀글)</span>`;
                } else {
                    // 일반 유저에게는 내용을 숨김
                    displayTitle = `<span style="color:#999;">🔒 비밀글입니다.</span>`;
                }
            }

            // newBadgeHtml 변수를 제목 앞에 추가
            tr.innerHTML = `
                <td class="col-num" style="width:70px;"><span class="board-tag">${data.boardName}</span></td>
                <td class="col-title">
                  ${data.isNotice ? '<span class="notice-badge">공지</span>' : ''}
                  ${newBadgeHtml}
                  ${displayTitle}
                </td>
                <td class="col-date">${data.dateShort}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 4. 프로필 정보 저장
    async function saveProfile() {
        const nickname = document.getElementById('profNickname').value.trim();
        const phone = document.getElementById('profPhone').value.trim();
        const birth = document.getElementById('profBirth').value;
        const address = document.getElementById('profAddress').value.trim();
        const password = document.getElementById('profPassword').value;

        if (!password) return alert("정보를 저장하려면 현재 비밀번호를 입력해야 합니다.");
        if (!nickname) return alert("닉네임을 입력해 주세요.");

        try {
            await reauthenticateUser(password); 
            await db.collection("users").doc(currentUserEmail).set({
                nickname: nickname, // 닉네임 추가
                phone: phone,
                birth: birth,
                address: address
            }, { merge: true }); 
            
            alert("내 정보가 성공적으로 수정되었습니다.");
            
            // 변경된 닉네임을 화면에 즉시 반영
            currentUserNickname = nickname;
            document.getElementById('sideUserName').innerText = currentUserNickname;
            
            closeProfileModal(); // [모달 닫기 적용]
        } catch (error) {
            alert("비밀번호가 일치하지 않거나 오류가 발생했습니다.");
        }
    }

    // 5. 회원 탈퇴
    async function deleteUserAccount() {
        const password = document.getElementById('profPassword').value;
        if (!password) return alert("탈퇴를 진행하시려면 먼저 위 입력칸에 비밀번호를 입력해 주세요.");
        
        if (!confirm("정말 회원 탈퇴를 진행하시겠습니까?\n작성한 정보와 계정이 모두 삭제되며, 이 작업은 되돌릴 수 없습니다.")) return;

        try {
            await reauthenticateUser(password); 
            const user = firebase.auth().currentUser;
            
            await db.collection("users").doc(currentUserEmail).delete();
            await user.delete();
            
            alert("회원 탈퇴가 정상적으로 처리되었습니다. 이용해 주셔서 감사합니다.");
            closeProfileModal(); // [탈퇴 완료 후 모달 닫기 적용]
            
        } catch (error) {
            alert("비밀번호가 일치하지 않거나 탈퇴 중 오류가 발생했습니다.");
        }
    }
</script>
