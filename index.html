<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meantz 놀이터</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script> 
    
    <style>
        /* 1 ~ 9번 스타일 기존 코드 유지 */
        /* ... (기존 CSS 코드들) ... */

        /* ========================================== */
        /* 10. 이미지 업로드 드래그 앤 드롭 스타일 [추가됨] */
        /* ========================================== */
        .image-upload-wrapper { margin-top: 15px; margin-bottom: 20px; }
        .image-upload-wrapper label { display: block; font-size: 13px; font-weight: bold; color: var(--text-main); margin-bottom: 8px; }
        .dropzone { border: 2px dashed var(--border-color); border-radius: 8px; padding: 25px; text-align: center; background-color: #f8f9fa; color: var(--text-sub); cursor: pointer; transition: 0.2s; font-size: 13px; }
        .dropzone:hover { border-color: #a4b0be; background-color: #f1f2f6; }
        .dropzone.dragover { border-color: var(--accent-color); background-color: #fff4f4; color: var(--accent-color); font-weight: bold; }
        .preview-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .image-preview { position: relative; width: 70px; height: 70px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border-color); }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .delete-btn { position: absolute; top: 3px; right: 3px; background: rgba(0, 0, 0, 0.7); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .delete-btn:hover { background: var(--danger); transform: scale(1.1); }
    </style>
</head>
<body>
    
    <div id="editorView" class="hidden">
        <div class="board-header"><h2 id="editorTitleText">글 작성</h2></div>
        <div class="card">
            <input type="hidden" id="editId">
            <div style="display:flex; justify-content: space-between; margin-bottom: 15px; font-size: 13px; color: #666; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                </div>
            
            <input type="text" id="postTitleInput" placeholder="제목을 입력하세요" style="font-size: 16px; font-weight: bold; margin-bottom:15px;">
            <textarea id="postContentInput" placeholder="자유롭게 이야기를 남겨주세요." style="height:400px; resize: vertical; line-height: 1.6;"></textarea>

            <div class="image-upload-wrapper">
                <label>📸 사진 첨부 (최대 10장, 장당 최대 2MB)</label>
                <div id="image-dropzone" class="dropzone">
                    여기를 클릭하거나 이미지를 드래그 앤 드롭 하세요.
                    <input type="file" id="image-input" multiple accept="image/*" style="display: none;">
                </div>
                <div id="image-preview-container" class="preview-container"></div>
            </div>
            <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                </div>
        </div>
    </div>

    <script>
        // Firestore 설정, 로그인, 메뉴 렌더링 등 기존 자바스크립트 유지
        // ... (기존 자바스크립트 코드들) ...

        /* ==========================================
           [추가됨] 이미지 업로드 관리 및 Storage 연동 로직
           ========================================== */
        let selectedImageFiles = []; 
        const MAX_IMAGES = 10;
        const MAX_FILE_SIZE = 2 * 1024 * 1024; // 2MB

        const dropzone = document.getElementById('image-dropzone');
        const imageInput = document.getElementById('image-input');
        const previewContainer = document.getElementById('image-preview-container');

        if(dropzone) {
            dropzone.addEventListener('click', () => imageInput.click());
            dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
            dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                handleImageFiles(e.dataTransfer.files);
            });
        }

        if(imageInput) {
            imageInput.addEventListener('change', (e) => {
                handleImageFiles(e.target.files);
                e.target.value = ''; 
            });
        }

        function handleImageFiles(files) {
            const newFiles = Array.from(files);
            
            if (selectedImageFiles.length + newFiles.length > MAX_IMAGES) {
                alert(`이미지는 최대 ${MAX_IMAGES}장까지만 업로드 가능합니다.`);
                return;
            }

            newFiles.forEach(file => {
                if (!file.type.startsWith('image/')) {
                    alert(`이미지 파일만 가능합니다: ${file.name}`);
                    return;
                }
                if (file.size > MAX_FILE_SIZE) {
                    alert(`2MB 이하의 파일만 업로드 가능합니다: ${file.name}`);
                    return;
                }
                selectedImageFiles.push(file);
            });

            renderImagePreviews();
        }

        function renderImagePreviews() {
            previewContainer.innerHTML = '';
            selectedImageFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'image-preview';
                    div.innerHTML = `
                        <img src="${e.target.result}" alt="preview">
                        <button class="delete-btn" onclick="removeImage(${index}, event)">✕</button>
                    `;
                    previewContainer.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        function removeImage(index, event) {
            event.stopPropagation();
            selectedImageFiles.splice(index, 1);
            renderImagePreviews();
        }

        function resetImageUploader() {
            selectedImageFiles = [];
            previewContainer.innerHTML = '';
        }

        async function uploadImagesToStorage() {
            if (selectedImageFiles.length === 0) return [];

            const storage = firebase.storage();
            const uploadedURLs = [];

            const loadingLayer = document.getElementById('loadingLayer');
            if(loadingLayer) {
                loadingLayer.innerText = '이미지 업로드 중...';
                loadingLayer.style.display = 'flex';
            }

            for (let file of selectedImageFiles) {
                const fileName = `post_images/${Date.now()}_${Math.random().toString(36).substring(2, 7)}_${file.name}`;
                const storageRef = storage.ref().child(fileName);
                
                try {
                    const snapshot = await storageRef.put(file);
                    const downloadURL = await snapshot.ref.getDownloadURL();
                    uploadedURLs.push(downloadURL);
                } catch (error) {
                    console.error("Storage upload error:", error);
                    alert("이미지 업로드에 실패했습니다.");
                    if(loadingLayer) loadingLayer.style.display = 'none';
                    return null; 
                }
            }
            
            if(loadingLayer) loadingLayer.style.display = 'none';
            return uploadedURLs; 
        }

        /* ==========================================
           [수정됨] 기존 글 저장 함수 (savePost) 업데이트
           기존 작성된 savePost 함수 안에 이미지 업로드 로직(1~3번)을 합쳐주세요.
           ========================================== */
        async function savePost() {
            // ... (기존에 제목/내용 유효성 검사하는 로직들) ...

            // 1. Firebase Storage에 이미지 먼저 업로드
            const imageUrls = await uploadImagesToStorage();
            if (imageUrls === null) return; // 업로드 실패 시 함수 중단

            // 2. Firestore에 저장할 데이터 객체 구성
            const postData = {
                title: document.getElementById('postTitleInput').value,
                content: document.getElementById('postContentInput').value,
                images: imageUrls, // ✅ 업로드된 이미지 다운로드 URL 배열 추가
                // ... (나머지 기존 author, timestamp, isNotice 등 속성들 유지) ...
            };

            try {
                // 3. 기존 Firestore에 add() 혹은 update() 하는 코드
                // await db.collection("posts").add(postData);
                
                // 완료 후 입력 폼과 이미지 업로더 모두 초기화
                // ... (기존 document.getElementById('postTitleInput').value = "" 등) ...
                resetImageUploader(); // ✅ 이미지 폼 초기화 추가
                
                alert("글이 저장되었습니다.");
                // showList(); 
            } catch(e) {
                console.error(e);
                alert("글 작성 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
