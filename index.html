<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meantz 놀이터 v1.6</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --sidebar-width: 240px;
            --dark-bg: #1a1a1a;
            --accent-color: #eb4d4b;
            --bg-color: #f4f7f6;
            --white: #ffffff;
            --border: #e0e0e0;
        }

        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg-color); color: #333; }
        .hidden { display: none !important; }

        /* 로그인 */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 12px; background: var(--dark-bg); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* 레이아웃 */
        #mainApp { display: flex; min-height: 100vh; }
        nav { width: var(--sidebar-width); background: var(--dark-bg); color: #ccc; position: fixed; height: 100%; display: flex; flex-direction: column; }
        nav h3 { padding: 25px 20px; color: white; border-bottom: 1px solid #333; margin: 0; }
        nav ul { list-style: none; padding: 0; flex-grow: 1; margin: 0; overflow-y: auto; }
        nav ul li { padding: 15px 25px; cursor: pointer; transition: 0.2s; }
        nav ul li.active { background: #333; color: white; border-right: 4px solid var(--accent-color); }
        .nav-footer { padding: 15px; border-top: 1px solid #333; }
        .logout-btn { width: 100%; padding: 8px; background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; cursor: pointer; border-radius: 4px; margin-top: 10px; }

        main { flex: 1; margin-left: var(--sidebar-width); padding: 40px 20px; display: flex; justify-content: center; }
        .content-wrapper { width: 100%; max-width: 900px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }

        /* 테이블/검색/버튼 */
        .board-header { border-bottom: 2px solid var(--dark-bg); margin-bottom: 20px; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f9f9f9; font-size: 0.85rem; color: #777; }
        .btn-main { background: var(--dark-bg); color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-sub { background: #eee; color: #333; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }

        .search-bar { display: flex; gap: 5px; margin-top: 20px; }
        .search-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }

        /* 메뉴 관리 모달 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 350px; max-height: 80vh; overflow-y: auto; }
        .menu-item-edit { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #eee; }
        .order-btns button { padding: 2px 5px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2>Meantz 놀이터</h2>
        <input type="email" id="loginEmail" placeholder="아이디(이메일)">
        <input type="password" id="loginPw" placeholder="비밀번호">
        <button onclick="handleLogin()">로그인</button>
        <p id="loginError" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="mainApp" class="hidden">
    <nav>
        <h3>MY BOARD</h3>
        <ul id="menuList"></ul>
        <div class="nav-footer">
            <button id="adminMenuBtn" class="btn-sub hidden" style="width:100%; font-size: 12px;" onclick="toggleMenuModal()">⚙️ 메뉴 관리 (순서변경)</button>
            <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
        </div>
    </nav>

    <main>
        <div class="content-wrapper">
            <div id="listView">
                <div class="board-header"><h2 id="boardTitle">게시판</h2></div>
                <div class="card" style="padding:0">
                    <table>
                        <thead><tr><th>번호</th><th>제목</th><th>작성자</th><th>날짜</th></tr></thead>
                        <tbody id="postTableBody"></tbody>
                    </table>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="제목 또는 내용 검색..." onkeyup="if(window.event.keyCode==13) searchPosts()">
                    <button class="btn-sub" onclick="searchPosts()">검색</button>
                    <button class="btn-main" onclick="showEditor()" style="margin-left:auto;">글쓰기</button>
                </div>
            </div>

            <div id="editorView" class="hidden">
                <div class="board-header"><h2 id="editorTitle">작성</h2></div>
                <div class="card">
                    <input type="hidden" id="editId">
                    <p style="margin: 0 0 10px 0; font-size: 13px; color: #666;">작성자: <b id="displayAuthor"></b></p>
                    <input type="text" id="postTitleInput" placeholder="제목을 입력하세요" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; box-sizing: border-box;">
                    <textarea id="postContentInput" style="width:100%; height:350px; padding:10px; border:1px solid #ddd; box-sizing: border-box;"></textarea>
                    <div style="text-align: right; margin-top:15px;">
                        <button class="btn-sub" onclick="showList()">취소</button>
                        <button class="btn-main" onclick="savePost()">저장하기</button>
                    </div>
                </div>
            </div>

            <div id="detailView" class="hidden">
                <div class="board-header"><h2 id="viewTitle">내용 보기</h2></div>
                <div class="card">
                    <p id="viewMeta" style="color:#888; font-size:13px;"></p>
                    <div id="viewContent" style="white-space: pre-wrap; line-height:1.6; min-height:150px;"></div>
                    <div style="margin-top:40px; display:flex; justify-content:space-between; border-top: 1px solid #eee; padding-top: 20px;">
                        <button class="btn-sub" onclick="showList()">목록으로</button>
                        <div>
                            <button id="editBtn" class="btn-sub">수정</button>
                            <button id="deleteBtn" class="btn-sub" style="color:red;">삭제</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="menuModal" class="modal hidden">
    <div class="modal-content">
        <h3>메뉴 관리 (순서/삭제)</h3>
        <div id="menuEditArea"></div>
        <hr>
        <div style="display:flex; gap:5px;">
            <input type="text" id="newMenuInput" placeholder="새 이름" style="flex:1; padding:5px;">
            <button onclick="addMenu()">추가</button>
        </div>
        <button class="btn-main" style="width:100%; margin-top:15px;" onclick="saveMenuOrder()">최종 순서 저장</button>
        <button class="btn-sub" style="width:100%; margin-top:5px;" onclick="toggleMenuModal()">닫기</button>
    </div>
</div>

<script>
    // [관리자 설정] 이 이메일 주소들만 메뉴 수정 버튼이 보입니다.
    const ADMIN_EMAILS = ["admin@test.com"]; 

    const firebaseConfig = {
        apiKey: "AIzaSyB8uG7VjV3cB12gaynB6AmTyjHcw0K9M-U",
        authDomain: "meantzboard.firebaseapp.com",
        projectId: "meantzboard",
        storageBucket: "meantzboard.firebasestorage.app",
        messagingSenderId: "807743275828",
        appId: "1:807743275828:web:2effa72896931a2df15b61"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentBoard = "";
    let boards = [];
    let currentUserEmail = "";

    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const pw = document.getElementById('loginPw').value;
        auth.signInWithEmailAndPassword(email, pw).catch(e => {
            document.getElementById('loginError').innerText = "아이디/비밀번호 오류입니다.";
        });
    }
    function handleLogout() { auth.signOut(); }

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUserEmail = user.email;
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            // 관리자 확인
            if (ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('adminMenuBtn').classList.remove('hidden');
            }
            loadMenu();
        } else {
            document.getElementById('loginOverlay').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
        }
    });

    // 메뉴 관리 로직
    async function loadMenu() {
        const doc = await db.collection("settings").doc("menu").get();
        boards = doc.exists ? doc.data().list : ["자유게시판"];
        renderMenu();
        if(!currentBoard) switchBoard(boards[0]);
    }

    function renderMenu() {
        const list = document.getElementById('menuList');
        list.innerHTML = "";
        boards.forEach(b => {
            const li = document.createElement('li');
            li.innerText = b;
            if(b === currentBoard) li.className = "active";
            li.onclick = () => switchBoard(b);
            list.appendChild(li);
        });
    }

    function switchBoard(name) {
        currentBoard = name;
        document.getElementById('boardTitle').innerText = name;
        document.getElementById('searchInput').value = "";
        renderMenu();
        showList();
    }

    // 메뉴 순서 변경 및 삭제 모달 로직
    function toggleMenuModal() {
        const modal = document.getElementById('menuModal');
        modal.classList.toggle('hidden');
        if(!modal.classList.contains('hidden')) renderMenuEditArea();
    }

    function renderMenuEditArea() {
        const area = document.getElementById('menuEditArea');
        area.innerHTML = "";
        boards.forEach((b, i) => {
            const div = document.createElement('div');
            div.className = "menu-item-edit";
            div.innerHTML = `
                <span>${b}</span>
                <div class="order-btns">
                    <button onclick="moveMenu(${i}, -1)">▲</button>
                    <button onclick="moveMenu(${i}, 1)">▼</button>
                    <button onclick="deleteMenu(${i})" style="color:red; margin-left:5px;">X</button>
                </div>
            `;
            area.appendChild(div);
        });
    }

    function moveMenu(index, direction) {
        const newIdx = index + direction;
        if (newIdx < 0 || newIdx >= boards.length) return;
        const temp = boards[index];
        boards[index] = boards[newIdx];
        boards[newIdx] = temp;
        renderMenuEditArea();
    }

    async function deleteMenu(index) {
        if(boards.length <= 1) return alert("게시판은 최소 1개여야 합니다.");
        if(confirm("이 게시판 목록을 삭제할까요? (데이터는 삭제되지 않음)")) {
            boards.splice(index, 1);
            renderMenuEditArea();
        }
    }

    async function addMenu() {
        const val = document.getElementById('newMenuInput').value.trim();
        if(val && !boards.includes(val)) {
            boards.push(val);
            document.getElementById('newMenuInput').value = "";
            renderMenuEditArea();
        }
    }

    async function saveMenuOrder() {
        await db.collection("settings").doc("menu").set({ list: boards });
        alert("순서가 저장되었습니다.");
        loadMenu();
        toggleMenuModal();
    }

    // 게시판 핵심 로직
    async function showList(search = "") {
        hideAll();
        document.getElementById('listView').classList.remove('hidden');
        const tbody = document.getElementById('postTableBody');
        tbody.innerHTML = "<tr><td colspan='4'>로딩 중...</td></tr>";

        let snapshot = await db.collection("boards").doc(currentBoard).collection("posts").orderBy("timestamp", "desc").get();
        tbody.innerHTML = "";
        
        let filtered = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            if(!search || data.title.includes(search) || data.content.includes(search)) {
                filtered.push({id: doc.id, ...data});
            }
        });

        if(filtered.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>결과가 없습니다.</td></tr>";
            return;
        }

        filtered.forEach((data, i) => {
            const tr = document.createElement('tr');
            tr.onclick = () => showDetail(data.id, data);
            tr.innerHTML = `<td>${filtered.length - i}</td><td>${data.title}</td><td>${data.author}</td><td>${data.dateShort}</td>`;
            tbody.appendChild(tr);
        });
    }

    function searchPosts() {
        const query = document.getElementById('searchInput').value.trim();
        showList(query);
    }

    async function savePost() {
        const title = document.getElementById('postTitleInput').value.trim();
        const content = document.getElementById('postContentInput').value.trim();
        const editId = document.getElementById('editId').value;

        if(!title || !content) return alert("제목과 내용을 입력하세요.");

        const now = new Date();
        const dateShort = `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()}`;
        const postData = { 
            title, 
            author: currentUserEmail, // 로그인한 계정으로 고정
            content, 
            dateShort, 
            timestamp: firebase.firestore.FieldValue.serverTimestamp() 
        };

        if(editId) {
            await db.collection("boards").doc(currentBoard).collection("posts").doc(editId).update(postData);
        } else {
            await db.collection("boards").doc(currentBoard).collection("posts").add(postData);
        }
        showList();
    }

    function showDetail(id, data) {
        hideAll();
        document.getElementById('detailView').classList.remove('hidden');
        document.getElementById('viewTitle').innerText = data.title;
        document.getElementById('viewMeta').innerText = `작성자: ${data.author} | 날짜: ${data.dateShort}`;
        document.getElementById('viewContent').innerText = data.content;
        document.getElementById('editBtn').onclick = () => showEditor(id, data);
        document.getElementById('deleteBtn').onclick = async () => {
            if(confirm("삭제할까요?")) {
                await db.collection("boards").doc(currentBoard).collection("posts").doc(id).delete();
                showList();
            }
        };
    }

    function showEditor(id = null, data = null) {
        hideAll();
        document.getElementById('editorView').classList.remove('hidden');
        document.getElementById('displayAuthor').innerText = currentUserEmail;
        if(id) {
            document.getElementById('editorTitle').innerText = "글 수정";
            document.getElementById('editId').value = id;
            document.getElementById('postTitleInput').value = data.title;
            document.getElementById('postContentInput').value = data.content;
        } else {
            document.getElementById('editorTitle').innerText = "새 글 작성";
            document.getElementById('editId').value = "";
            document.getElementById('postTitleInput').value = "";
            document.getElementById('postContentInput').value = "";
        }
    }

    function hideAll() {
        ['listView', 'editorView', 'detailView'].forEach(id => document.getElementById(id).classList.add('hidden'));
    }
</script>
</body>
</html>
