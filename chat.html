<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 채팅</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #ffffff; color: #000; }
        header { background: #ffffff; color: #000; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #eee; }
        
        /* 접속자 목록 영역 */
        #presenceBar { background: #f9f9f9; padding: 8px 15px; font-size: 11px; color: #666; border-bottom: 1px solid #eee; }
        #userList { font-weight: bold; color: #333; }

        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.5; }
        .msg.mine { align-self: flex-end; background: #000; color: #fff; }
        .msg.others { align-self: flex-start; background: #f1f1f1; color: #000; border: 1px solid #eee; }
        
        .sender { font-size: 11px; margin-bottom: 4px; color: #888; }
        .mine .sender { text-align: right; color: #ccc; }

        .input-area { padding: 15px; background: #ffffff; display: flex; gap: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; outline: none; font-size: 14px; }
        button { padding: 0 20px; background: #000; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>CHAT ROOM</header>
    <div id="presenceBar">접속 중: <span id="userList">불러오는 중...</span></div>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." onkeyup="if(window.event.keyCode==13) sendChat()">
        <button onclick="sendChat()">전송</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8uG7VjV3cB12gaynB6AmTyjHcw0K9M-U",
            authDomain: "meantzboard.firebaseapp.com",
            projectId: "meantzboard",
            storageBucket: "meantzboard.firebasestorage.app",
            messagingSenderId: "807743275828",
            appId: "1:807743275828:web:2effa72896931a2df15b61"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userEmail = "";

        auth.onAuthStateChanged(user => {
            if(user) {
                userEmail = user.email;
                enterRoom();
                listenChat();
                listenPresence();
            } else {
                window.close();
            }
        });

        // 1. 채팅방 입장 처리 (접속자 명단 등록)
        async function enterRoom() {
            await db.collection("presence").doc(userEmail).set({
                email: userEmail,
                lastActive: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            // 창을 닫을 때 명단에서 제거
            window.addEventListener('beforeunload', () => {
                db.collection("presence").doc(userEmail).delete();
            });
        }

        // 2. 실시간 접속자 리스너
        function listenPresence() {
            db.collection("presence").onSnapshot(snapshot => {
                const users = [];
                snapshot.forEach(doc => users.push(doc.data().email.split('@')[0])); // 이메일 앞부분만 표시
                document.getElementById('userList').innerText = users.join(", ");
            });
        }

        // 3. 메시지 전송
        async function sendChat() {
            const msg = document.getElementById('chatInput').value.trim();
            if(!msg) return;
            document.getElementById('chatInput').value = "";
            await db.collection("chats").add({
                sender: userEmail,
                text: msg,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        // 4. 실시간 메시지 리스너
        function listenChat() {
            db.collection("chats").orderBy("timestamp", "asc").limitToLast(50)
                .onSnapshot(snapshot => {
                    const chatBox = document.getElementById('chatBox');
                    chatBox.innerHTML = "";
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if(!data.timestamp) return; // 서버 시간 동기화 대기
                        const isMine = data.sender === userEmail;
                        const div = document.createElement('div');
                        div.className = `msg ${isMine ? 'mine' : 'others'}`;
                        div.innerHTML = `
                            <div class="sender">${data.sender}</div>
                            <div>${data.text}</div>
                        `;
                        chatBox.appendChild(div);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                });
        }
    </script>
</body>
</html>
