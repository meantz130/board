<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실시간 채팅</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { 
            font-family: 'Pretendard', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: #ffffff; 
            overflow: hidden; 
        }
        header { 
            background: #ffffff; 
            padding: 15px; 
            text-align: center; 
            font-weight: bold; 
            border-bottom: 1px solid #eee;
            font-size: 1.1rem;
        }
        #presenceBar { 
            background: #f9f9f9; 
            padding: 8px 15px; 
            font-size: 12px; 
            color: #666; 
            border-bottom: 1px solid #eee;
        }
        #chatBox { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background-color: #f5f5f5;
        }

        /* 채팅 컨테이너 및 이름 스타일 */
        .msg-container {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .msg-container.mine {
            align-self: flex-end;
            align-items: flex-end;
        }
        .msg-container.others {
            align-self: flex-start;
            align-items: flex-start;
        }
        .sender-name {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            padding: 0 4px;
            font-weight: bold;
        }

        /* 말풍선 스타일 */
        .msg { 
            padding: 10px 14px; 
            border-radius: 12px; 
            font-size: 15px; 
            line-height: 1.5; 
            word-break: break-all;
        }
        .msg.mine { 
            background: #000; 
            color: #fff; 
            border-top-right-radius: 2px;
        }
        .msg.others { 
            background: #fff; 
            color: #000; 
            border: 1px solid #ddd; 
            border-top-left-radius: 2px;
        }

        /* 입력 영역 */
        .input-area { 
            padding: 10px 15px; 
            background: #ffffff; 
            display: flex; 
            gap: 8px; 
            border-top: 1px solid #eee;
            padding-bottom: env(safe-area-inset-bottom, 10px); 
        }
        input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            outline: none; 
            font-size: 16px; 
        }
        button { 
            padding: 0 20px; 
            background: #000; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>CHAT ROOM</header>
    <div id="presenceBar">접속 중: <span id="userList">불러오는 중...</span></div>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." onkeyup="if(window.event.keyCode==13) sendChat()" inputmode="text">
        <button onclick="sendChat()">전송</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8uG7VjV3cB12gaynB6AmTyjHcw0K9M-U",
            authDomain: "meantzboard.firebaseapp.com",
            projectId: "meantzboard",
            storageBucket: "meantzboard.firebasestorage.app",
            messagingSenderId: "807743275828",
            appId: "1:807743275828:web:2effa72896931a2df15b61"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let userEmail = "";
        let entryTime = new Date();

        auth.onAuthStateChanged(user => {
            if(user) {
                userEmail = user.email;
                entryTime = new Date(); 
                enterRoom();
                listenChat();
                listenPresence();
            } else {
                // 필요 시 로그인 페이지 이동 로직 추가
            }
        });

        async function enterRoom() {
            await db.collection("presence").doc(userEmail).set({
                email: userEmail,
                lastActive: firebase.firestore.FieldValue.serverTimestamp()
            });
            window.addEventListener('beforeunload', () => {
                db.collection("presence").doc(userEmail).delete();
            });
        }

        function listenPresence() {
            db.collection("presence").onSnapshot(snapshot => {
                const users = [];
                snapshot.forEach(doc => users.push(doc.data().email.split('@')[0]));
                document.getElementById('userList').innerText = users.join(", ");
            });
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if(!msg) return;
            input.value = "";
            input.focus();
            await db.collection("chats").add({
                sender: userEmail,
                text: msg,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function listenChat() {
            db.collection("chats")
                .where("timestamp", ">", entryTime) 
                .orderBy("timestamp", "asc")
                .onSnapshot(snapshot => {
                    const chatBox = document.getElementById('chatBox');
                    snapshot.docChanges().forEach(change => {
                        if (change.type === "added") {
                            const data = change.doc.data();
                            const isMine = data.sender === userEmail;
                            
                            // [수정된 부분] 컨테이너 기반 레이아웃 생성
                            const container = document.createElement('div');
                            container.className = `msg-container ${isMine ? 'mine' : 'others'}`;

                            const shortName = data.sender.split('@')[0];
                            const nameDiv = document.createElement('div');
                            nameDiv.className = 'sender-name';
                            nameDiv.innerText = isMine ? '나' : shortName;

                            const msgDiv = document.createElement('div');
                            msgDiv.className = `msg ${isMine ? 'mine' : 'others'}`;
                            msgDiv.innerText = data.text;

                            container.appendChild(nameDiv);
                            container.appendChild(msgDiv);
                            
                            chatBox.appendChild(container);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    });
                });
        }
    </script>
</body>
</html>
