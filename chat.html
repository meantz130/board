<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Meantz 실시간 채팅</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* 스타일은 v2.0과 동일 (생략) */
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #ffffff; color: #000; }
        header { background: #ffffff; color: #000; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #eee; }
        #presenceBar { background: #f9f9f9; padding: 8px 15px; font-size: 11px; color: #666; border-bottom: 1px solid #eee; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.5; }
        .msg.mine { align-self: flex-end; background: #000; color: #fff; }
        .msg.others { align-self: flex-start; background: #f1f1f1; color: #000; border: 1px solid #eee; }
        .sender { font-size: 11px; margin-bottom: 4px; color: #888; }
        .input-area { padding: 15px; background: #ffffff; display: flex; gap: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        button { padding: 0 20px; background: #000; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header>CHAT ROOM</header>
    <div id="presenceBar">접속 중: <span id="userList">불러오는 중...</span></div>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." onkeyup="if(window.event.keyCode==13) sendChat()">
        <button onclick="sendChat()">전송</button>
    </div>

    <script>
        const firebaseConfig = { /* 동일한 설정값 사용 */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let userEmail = "";
        let entryTime = new Date(); // 채팅방에 들어온 시점의 시간 저장

        auth.onAuthStateChanged(user => {
            if(user) {
                userEmail = user.email;
                // 입장 시간 갱신 (서버 시간 오차를 고려해 약간의 여유를 둠)
                entryTime = new Date(); 
                enterRoom();
                listenChat();
                listenPresence();
            } else {
                window.close();
            }
        });

        async function enterRoom() {
            await db.collection("presence").doc(userEmail).set({
                email: userEmail,
                lastActive: firebase.firestore.FieldValue.serverTimestamp()
            });
            window.addEventListener('beforeunload', () => {
                db.collection("presence").doc(userEmail).delete();
            });
        }

        function listenPresence() {
            db.collection("presence").onSnapshot(snapshot => {
                const users = [];
                snapshot.forEach(doc => users.push(doc.data().email.split('@')[0]));
                document.getElementById('userList').innerText = users.join(", ");
            });
        }

        async function sendChat() {
            const msg = document.getElementById('chatInput').value.trim();
            if(!msg) return;
            document.getElementById('chatInput').value = "";
            await db.collection("chats").add({
                sender: userEmail,
                text: msg,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function listenChat() {
            // 핵심 변경: 본인의 entryTime보다 큰(이후인) 메시지만 가져옴
            db.collection("chats")
                .where("timestamp", ">", entryTime) 
                .orderBy("timestamp", "asc")
                .onSnapshot(snapshot => {
                    const chatBox = document.getElementById('chatBox');
                    // 'added'된 문서만 처리하거나 전체를 다시 그리도록 구성
                    snapshot.docChanges().forEach(change => {
                        if (change.type === "added") {
                            const data = change.doc.data();
                            const isMine = data.sender === userEmail;
                            const div = document.createElement('div');
                            div.className = `msg ${isMine ? 'mine' : 'others'}`;
                            div.innerHTML = `
                                <div class="sender">${data.sender}</div>
                                <div>${data.text}</div>
                            `;
                            chatBox.appendChild(div);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    });
                });
        }
    </script>
</body>
</html>
